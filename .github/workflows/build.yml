name: Build Cross-Platform Executables

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [created]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable with PyInstaller (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --name lvcopilot-${{ runner.os }} --onefile \
            --add-data "lvcopilot/md_files:lvcopilot/md_files" \
            --add-data "lvcopilot/skills:lvcopilot/skills" \
            --collect-data litellm \
            --copy-metadata litellm \
            run.py

      - name: Build executable with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --name lvcopilot-${{ runner.os }}.exe --onefile `
            --add-data "lvcopilot/md_files;lvcopilot/md_files" `
            --add-data "lvcopilot/skills;lvcopilot/skills" `
            --collect-data litellm `
            --copy-metadata litellm `
            run.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lvcopilot-${{ runner.os }}
          path: dist/*

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
